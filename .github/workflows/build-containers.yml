name: Build Docker and Singularity Images

on:
  push:
    branches: [ "main" ]
  release:
    types: [published]

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: micalab

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          RAW_NAME="${{ env.DOCKERHUB_USERNAME }}/${GITHUB_REPOSITORY#*/}"
          echo "IMAGE_NAME=${RAW_NAME,,}" >> "$GITHUB_ENV"

      - name: Debug image name
        run: |
          echo "IMAGE_NAME=$IMAGE_NAME"
          test -n "$IMAGE_NAME"

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Test Docker Image
        run: |
          docker run --rm --entrypoint="" ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main pytest tests/test_cli_interface.py

  build-singularity:
    needs: build-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: |
          RAW_NAME="${{ env.DOCKERHUB_USERNAME }}/${GITHUB_REPOSITORY#*/}"
          echo "IMAGE_NAME=${RAW_NAME,,}" >> "$GITHUB_ENV"

      - name: Setup Apptainer/Singularity
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.2.2

      - name: Login to GHCR for Apptainer
        run: |
          apptainer registry remote login docker://ghcr.io \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}"

      - name: Build Singularity Image
        run: |
          IMAGE_URL="docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
          apptainer build micaflow.sif "$IMAGE_URL"
