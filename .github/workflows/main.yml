name: Build and Deploy Documentation

on:
  push:
    branches: [main]  # Change to your primary branch
    paths:
      - 'scripts/**'
      - 'docs/**'
      - '.github/workflows/main.yml'
  workflow_dispatch:  # <-- Allows triggering manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx sphinx-rtd-theme sphinx-copybutton sphinx-tabs
            
          # Install project dependencies
          pip install -e .
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build documentation
        run: |
          cd docs
          make html
          # Note: If your sphinx outputs to _build/html, change the paths here and below
          touch build/html/.nojekyll
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html # <-- Ensure this matches Sphinx output (often ./docs/_build/html)
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
